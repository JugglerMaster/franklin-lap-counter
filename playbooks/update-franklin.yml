---
- name: Update Franklin application on Raspberry Pi (build + deploy per host)
  hosts: all
  gather_facts: false
  become: true
  vars:
    project_root: "{{ playbook_dir }}/.."
    pi_dest_dir: "{{ franklin_home }}/franklin-lap-counter"

  pre_tasks:
    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Detect Pi architecture
      ansible.builtin.command: dpkg --print-architecture
      register: pi_arch_cmd
      changed_when: false

    - name: Set detected arch fact
      ansible.builtin.set_fact:
        detected_arch: "{{ pi_arch_cmd.stdout | trim }}"

    # Only aarch64 is supported (lnav requires 64-bit)
    - name: Fail if Pi is not aarch64
      ansible.builtin.fail:
        msg: "Franklin requires a 64-bit Raspberry Pi. Detected arch={{ detected_arch }} but only arm64 is supported."
      when: detected_arch != 'arm64'

    - name: Set deb filename for this host
      ansible.builtin.set_fact:
        deb_filename: "franklin-hardware-monitor_{{ pkg_version }}_arm64"

    - name: Set local paths for this host's build artifacts
      ansible.builtin.set_fact:
        rust_deb_local: "{{ project_root }}/rust/target/debian/{{ deb_filename }}.deb"

  tasks:
    # ---- Local build step (delegate_to: localhost) ----

    - name: Get package version from Cargo.toml
      ansible.builtin.shell:
        cmd: python3 -c "import re; m = re.search(r'\[workspace\.package\]\s*[\s\S]*?version\s*=\s*\"([^\"]+)\"', open('{{ project_root }}/rust/Cargo.toml').read()); print(m.group(1))"
      delegate_to: localhost
      become: false
      register: local_version_cmd
      changed_when: false

    - name: Set package version variable
      ansible.builtin.set_fact:
        pkg_version: "{{ local_version_cmd.stdout | trim }}"

    - name: Build Debian package for this host's architecture
      ansible.builtin.command:
        cmd: "RUST_PI_TARGET={{ rust_target }} python3 {{ project_root }}/scripts/build_deb.py"
      delegate_to: localhost
      become: false
      environment:
        RUST_PI_TARGET: "{{ rust_target }}"

    - name: Verify built .deb exists locally
      ansible.builtin.stat:
        path: "{{ rust_deb_local }}"
      delegate_to: localhost
      become: false
      register: deb_stat
      changed_when: false

    - name: Fail if build did not produce expected .deb
      ansible.builtin.fail:
        msg: "Build failed — expected {{ rust_deb_local }} but it does not exist"
      when: not deb_stat.stat.exists

    # ---- Deploy to Pi ----

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Copy Debian package to Pi
      ansible.builtin.copy:
        src: "{{ rust_deb_local }}"
        dest: "/tmp/{{ deb_filename }}.deb"
        mode: "0644"

    - name: Install/upgrade Debian package on Pi
      ansible.builtin.apt:
        deb: "/tmp/{{ deb_filename }}.deb"
        state: present

    - name: Remove temporary Debian package from Pi
      ansible.builtin.file:
        path: "/tmp/{{ deb_filename }}.deb"
        state: absent

    # ---- Deploy Python application files (same approach as deploy-franklin.yml) ----

    - name: Copy Python application files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item | basename }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0644"
      loop:
        - "{{ project_root }}/franklin-tui.py"
        - "{{ project_root }}/franklin-gui.py"
        - "{{ project_root }}/franklin-race-recorder.py"
        - "{{ project_root }}/gui_config.py"
        - "{{ project_root }}/scoreboard_web_app.py"
        - "{{ project_root }}/referee_web_app.py"
        - "{{ project_root }}/healthcheck_web_app.py"
        - "{{ project_root }}/driver_web_app.py"
        - "{{ project_root }}/racer_colors.py"
        - "{{ project_root }}/redis_commands.py"
        - "{{ project_root }}/database.py"

    - name: Deploy startup scripts (executable)
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ pi_dest_dir }}/{{ item.dest }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - { src: "{{ project_root }}/scripts/start_franklin.py", dest: "start_franklin.py" }
        - { src: "{{ project_root }}/scripts/start_franklin_gui_session.py", dest: "start_franklin_gui_session.py" }

    # Deploy directory trees with rsync (same approach as deploy-franklin.yml)
    - name: Deploy static directory via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/static/"
        dest: "{{ pi_dest_dir }}/static/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy race directory via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/race/"
        dest: "{{ pi_dest_dir }}/race/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy tmuxinator directory via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/tmuxinator/"
        dest: "{{ pi_dest_dir }}/tmuxinator/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    # ---- Update Python venv dependencies ----

    - name: Ensure Franklin's pip dependencies are up to date
      ansible.builtin.pip:
        name:
          - textual
          - "redis<6"
          - aiohttp
          - pygments
          - rich
        state: latest
        virtualenv: "{{ pi_dest_dir }}/.venv"

    # ---- Restart services ----

    - name: Reload systemd daemon (in case new service files were deployed)
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart all Franklin services via target
      ansible.builtin.systemd:
        name: franklin.target
        state: restarted
      ignore_errors: true

  post_tasks:
    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Updated {{ inventory_hostname }} (arch={{ detected_arch }}, rust_target={{ rust_target }})"
          - "Installed franklin-hardware-monitor_{{ pkg_version }}_{{ arch_label }}"
          - "Deployed Python files, static/, race/, tmuxinator/"
          - "Updated pip dependencies in venv"
          - "Restarted franklin.target"
