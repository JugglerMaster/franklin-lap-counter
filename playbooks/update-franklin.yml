---
- name: Update Franklin application on Raspberry Pi (build + deploy per host)
  hosts: all
  gather_facts: false
  become: true
  vars:
    project_root: "{{ playbook_dir }}/.."
    pi_dest_dir: /opt/franklin-lap-counter

  pre_tasks:
    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Detect Pi architecture
      ansible.builtin.command: dpkg --print-architecture
      register: pi_arch_cmd
      changed_when: false

    - name: Set detected arch fact
      ansible.builtin.set_fact:
        detected_arch: "{{ pi_arch_cmd.stdout | trim }}"

    # Only aarch64 is supported (lnav requires 64-bit)
    - name: Fail if Pi is not aarch64
      ansible.builtin.fail:
        msg: "Franklin requires a 64-bit Raspberry Pi. Detected arch={{ detected_arch }} but only arm64 is supported."
      when: detected_arch != 'arm64'

    - name: Set deb filename for this host
      ansible.builtin.set_fact:
        deb_filename: "franklin-hardware-monitor_{{ pkg_version }}_arm64"

    - name: Set local paths for this host's build artifacts
      ansible.builtin.set_fact:
        rust_deb_local: "{{ project_root }}/rust/target/debian/{{ deb_filename }}.deb"

  tasks:
    # ---- Local build step (delegate_to: localhost) ----

    - name: Get package version from Cargo.toml
      ansible.builtin.shell:
        cmd: python3 -c "import re; m = re.search(r'\[workspace\.package\]\s*[\s\S]*?version\s*=\s*\"([^\"]+)\"', open('{{ project_root }}/rust/Cargo.toml').read()); print(m.group(1))"
      delegate_to: localhost
      become: false
      register: local_version_cmd
      changed_when: false

    - name: Set package version variable
      ansible.builtin.set_fact:
        pkg_version: "{{ local_version_cmd.stdout | trim }}"

    - name: Build Debian package for this host's architecture
      ansible.builtin.command:
        cmd: "RUST_PI_TARGET={{ rust_target }} python3 {{ project_root }}/scripts/build_deb.py"
      delegate_to: localhost
      become: false
      environment:
        RUST_PI_TARGET: "{{ rust_target }}"

    - name: Verify built .deb exists locally
      ansible.builtin.stat:
        path: "{{ rust_deb_local }}"
      delegate_to: localhost
      become: false
      register: deb_stat
      changed_when: false

    - name: Fail if build did not produce expected .deb
      ansible.builtin.fail:
        msg: "Build failed — expected {{ rust_deb_local }} but it does not exist"
      when: not deb_stat.stat.exists

    # ---- Deploy to Pi ----

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure log directory exists for systemd service stdout
      ansible.builtin.file:
        path: /var/log/franklin
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Copy Debian package to Pi
      ansible.builtin.copy:
        src: "{{ rust_deb_local }}"
        dest: "/tmp/{{ deb_filename }}.deb"
        mode: "0644"

    - name: Install/upgrade Debian package on Pi
      ansible.builtin.apt:
        deb: "/tmp/{{ deb_filename }}.deb"
        state: present

    - name: Remove temporary Debian package from Pi
      ansible.builtin.file:
        path: "/tmp/{{ deb_filename }}.deb"
        state: absent

    # ---- Deploy application source files via rsync ----

    # Single-pass rsync from project root replaces per-file copy loops.
    # Runtime state (.venv, db, run) and build/dev directories are excluded.
    - name: Deploy application source files via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/"
        dest: "{{ pi_dest_dir }}/"
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
          - "--exclude=.venv/"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=.git/"
          - "--exclude=rust/"
          - "--exclude=db/"
          - "--exclude=run/"
          - "--exclude=*.log"
          - "--exclude=*.sock"
          - "--exclude=*.db"
          - "--exclude=dump.rdb"
          - "--exclude=.env"
          - "--exclude=.github/"
          - "--exclude=devbox.json"
          - "--exclude=devbox.lock"
          - "--exclude=devbox.d/"
          - "--exclude=.devbox/"
          - "--exclude=.ruff_cache/"
          - "--exclude=.lavish/"
          - "--exclude=.zed/"
          - "--exclude=playbooks/"
          - "--exclude=docs/"
          - "--exclude=terminfo/"
          - "--exclude=systemd/"
      become: false

    - name: Deploy static directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/static/"
        dest: "{{ pi_dest_dir }}/static/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy race directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/race/"
        dest: "{{ pi_dest_dir }}/race/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy tmuxinator directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/tmuxinator/"
        dest: "{{ pi_dest_dir }}/tmuxinator/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    # Startup scripts live under scripts/ in the repo but are expected at the
    # root of pi_dest_dir (referenced by systemd, wayland-sway, and users).
    - name: Deploy startup scripts
      ansible.builtin.copy:
        src: "{{ project_root }}/scripts/{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - start_franklin.py
        - start_franklin_gui_session.py

    # ---- Python virtual environment ----

    - name: Ensure Python venv exists at {{ pi_dest_dir }}/.venv
      ansible.builtin.command:
        cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"
        creates: "{{ pi_dest_dir }}/.venv/bin/activate"

    - name: Check whether GTK gi module is importable in venv
      ansible.builtin.command:
        cmd: "{{ pi_dest_dir }}/.venv/bin/python -c 'import gi'"
      register: venv_gi_check
      changed_when: false
      failed_when: false

    - name: Recreate venv with system site packages when gi is missing
      when: venv_gi_check.rc != 0
      block:
        - name: Remove incompatible virtual environment
          ansible.builtin.file:
            path: "{{ pi_dest_dir }}/.venv"
            state: absent

        - name: Recreate virtual environment with system site packages
          ansible.builtin.command:
            cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"

    - name: Ensure franklin owns the virtual environment
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}/.venv"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        recurse: true

    # ---- Update Python venv dependencies ----

    - name: Ensure Franklin's pip dependencies are up to date
      ansible.builtin.pip:
        name:
          - textual
          - "redis<6"
          - aiohttp
          - pygments
          - rich
        state: latest
        virtualenv: "{{ pi_dest_dir }}/.venv"

    # ---- Restart services ----

    - name: Reload systemd daemon (in case new service files were deployed)
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart all Franklin services via target
      ansible.builtin.systemd:
        name: franklin.target
        state: restarted
      ignore_errors: true

  post_tasks:
    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Updated {{ inventory_hostname }} (arch={{ detected_arch }}, rust_target={{ rust_target }})"
          - "Installed franklin-hardware-monitor_{{ pkg_version }}_{{ arch_label }}"
          - "Deployed application source files, static/, race/, tmuxinator/"
          - "Updated pip dependencies in venv"
          - "Restarted franklin.target"
