---
- name: Deploy Franklin application artifacts to Raspberry Pi
  hosts: all
  gather_facts: false
  become: true
  vars:
    project_root: "{{ playbook_dir }}/.."
    rust_target: "aarch64-unknown-linux-gnu"
    rust_deb_local: "{{ project_root }}/rust/target/debian/franklin-hardware-monitor_{{ pkg_version }}_arm64.deb"

  pre_tasks:
    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Get local package version from Cargo.toml
      ansible.builtin.shell:
        cmd: python3 -c "import re; m = re.search(r'\[workspace\.package\]\s*[\s\S]*?version\s*=\s*\"([^\"]+)\"', open('{{ project_root }}/rust/Cargo.toml').read()); print(m.group(1))"
      delegate_to: localhost
      become: false
      register: local_version_cmd
      changed_when: false

    - name: Set package version variable
      ansible.builtin.set_fact:
        pkg_version: "{{ local_version_cmd.stdout | trim }}"

    - name: Check project root exists
      ansible.builtin.stat:
        path: "{{ project_root }}/pyproject.toml"
      delegate_to: localhost
      become: false
      register: project_root_stat

    - name: Fail when project root is missing
      ansible.builtin.fail:
        msg: "Franklin project not found at {{ project_root }} (no pyproject.toml)"
      when: not project_root_stat.stat.exists

    - name: Check hardware monitor Debian package exists
      ansible.builtin.stat:
        path: "{{ rust_deb_local }}"
      delegate_to: localhost
      become: false
      register: deb_stat

    - name: Fail when Debian package is missing
      ansible.builtin.fail:
        msg: >-
          Hardware monitor .deb not found at {{ rust_deb_local }}.
          Build it first with: devbox run hardware-monitor:build-deb
      when: not deb_stat.stat.exists

    - name: Check systemd service directory exists locally
      ansible.builtin.stat:
        path: "{{ project_root }}/systemd"
      delegate_to: localhost
      become: false
      register: systemd_dir_stat

  tasks:
    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure log directory exists for systemd service stdout
      ansible.builtin.file:
        path: /var/log/franklin
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Ensure libudev-dev is installed on Pi (required at runtime)
      ansible.builtin.apt:
        name:
          - libudev-dev
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Get installed hardware monitor version on Pi
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Version}' franklin-hardware-monitor
      register: pi_version_cmd
      failed_when: false
      changed_when: false

    - name: Set installed version fact
      ansible.builtin.set_fact:
        installed_version: "{{ (pi_version_cmd.rc == 0) | ternary(pi_version_cmd.stdout | trim, '0.0.0') }}"

    - name: Copy Debian package to Pi
      ansible.builtin.copy:
        src: "{{ rust_deb_local }}"
        dest: "/tmp/{{ rust_deb_local | basename }}"
        mode: "0644"
      when: pkg_version is version(installed_version, '>')

    - name: Install Debian package on Pi
      ansible.builtin.apt:
        deb: "/tmp/{{ rust_deb_local | basename }}"
        state: present
      when: pkg_version is version(installed_version, '>')

    - name: Remove temporary Debian package from Pi
      ansible.builtin.file:
        path: "/tmp/{{ rust_deb_local | basename }}"
        state: absent
      when: pkg_version is version(installed_version, '>')

    # ── Python virtual environment ──────────────────────────────────────

    - name: Ensure Python venv exists at {{ pi_dest_dir }}/.venv
      ansible.builtin.command:
        cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"
        creates: "{{ pi_dest_dir }}/.venv/bin/activate"

    - name: Check whether GTK gi module is importable in venv
      ansible.builtin.command:
        cmd: "{{ pi_dest_dir }}/.venv/bin/python -c 'import gi'"
      register: venv_gi_check
      changed_when: false
      failed_when: false

    - name: Recreate venv with system site packages when gi is missing
      when: venv_gi_check.rc != 0
      block:
        - name: Remove incompatible virtual environment
          ansible.builtin.file:
            path: "{{ pi_dest_dir }}/.venv"
            state: absent

        - name: Recreate virtual environment with system site packages
          ansible.builtin.command:
            cmd: "python3 -m venv --system-site-packages {{ pi_dest_dir }}/.venv"

    - name: Install/upgrade Python application dependencies in venv
      ansible.builtin.pip:
        name: "{{ python_packages }}"
        state: latest
        virtualenv: "{{ pi_dest_dir }}/.venv"

    - name: Ensure franklin owns the virtual environment
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}/.venv"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        recurse: true

    - name: Remove stale virtual environment at old nested path ({{ pi_dest_dir }}/lib/.venv)
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}/lib/.venv"
        state: absent

    # Application source files are pushed with rsync (ansible.posix.synchronize)
    # instead of per-file copy loops (one SSH round-trip per file).  rsync
    # transfers all changes in a single pass, skipping unchanged files.
    #
    # We exclude runtime state directories (.venv, db, run — these exist only
    # on the Pi), build artifacts (rust, .git, node_modules), and dev/tooling
    # files that don't belong on the Pi.  The per-directory syncs below for
    # static/, race/, and tmuxinator/ handle deletion of stale files — the
    # root sync does NOT delete, so runtime state outside the excluded paths
    # is never accidentally wiped.
    #
    # rsync_path escalates on the Pi so the connection user (unprivileged) can
    # write to the franklin-owned dest.  become is disabled on the task since
    # rsync_path handles the escalation.
    - name: Deploy application source files via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/"
        dest: "{{ pi_dest_dir }}/"
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
          - "--exclude=.venv/"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=.git/"
          - "--exclude=rust/"
          - "--exclude=db/"
          - "--exclude=run/"
          - "--exclude=*.log"
          - "--exclude=*.sock"
          - "--exclude=*.db"
          - "--exclude=dump.rdb"
          - "--exclude=.env"
          - "--exclude=.github/"
          - "--exclude=devbox.json"
          - "--exclude=devbox.lock"
          - "--exclude=devbox.d/"
          - "--exclude=.devbox/"
          - "--exclude=.ruff_cache/"
          - "--exclude=.lavish/"
          - "--exclude=.zed/"
          - "--exclude=playbooks/"
          - "--exclude=docs/"
          - "--exclude=terminfo/"
          - "--exclude=systemd/"
      become: false

    # Per-directory rsync with delete so stale Pi-only files are cleaned up.
    # Safe because these dirs hold only source-controlled content.
    - name: Deploy static directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/static/"
        dest: "{{ pi_dest_dir }}/static/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy race directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/race/"
        dest: "{{ pi_dest_dir }}/race/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    - name: Deploy tmuxinator directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/tmuxinator/"
        dest: "{{ pi_dest_dir }}/tmuxinator/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    # Deploy systemd service files for background services (redis, hardware
    # monitor, race recorder, web apps). These are installed to
    # /etc/systemd/system/ and managed by systemd.
    - name: Deploy systemd service files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/etc/systemd/system/{{ item | basename }}"
        owner: "root"
        group: "root"
        mode: "0644"
      loop:
        - "{{ project_root }}/systemd/franklin-redis.service"
        - "{{ project_root }}/systemd/franklin-hardware-monitor.service"
        - "{{ project_root }}/systemd/franklin-race-recorder.service"
        - "{{ project_root }}/systemd/franklin-web-driver.service"
        - "{{ project_root }}/systemd/franklin-web-healthcheck.service"
        - "{{ project_root }}/systemd/franklin-web-referee.service"
        - "{{ project_root }}/systemd/franklin-web-scoreboard.service"
        - "{{ project_root }}/systemd/franklin.target"
      register: systemd_deploy
      when: systemd_dir_stat.stat.isdir

    - name: Reload systemd daemon after deploying service files
      ansible.builtin.systemd:
        daemon_reload: true
      when:
        - systemd_dir_stat.stat.isdir
        - systemd_deploy is changed

    # Startup scripts live under scripts/ in the repo but are expected at the
    # root of pi_dest_dir (referenced by systemd, wayland-sway, and users).
    # They are NOT rsynced to the correct location automatically.
    - name: Deploy startup scripts
      ansible.builtin.copy:
        src: "{{ project_root }}/scripts/{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - start_franklin.py
        - start_franklin_gui_session.py

    - name: Verify deployed files on remote host
      ansible.builtin.stat:
        path: "{{ item }}"
      register: remote_deployed_file_stats
      loop:
        - "/usr/bin/franklin-hardware-monitor"
        - "{{ pi_dest_dir }}/franklin-tui.py"
        - "{{ pi_dest_dir }}/franklin-gui.py"
        - "{{ pi_dest_dir }}/franklin-race-recorder.py"
        - "{{ pi_dest_dir }}/gui_config.py"
        - "{{ pi_dest_dir }}/scoreboard_web_app.py"
        - "{{ pi_dest_dir }}/referee_web_app.py"
        - "{{ pi_dest_dir }}/healthcheck_web_app.py"
        - "{{ pi_dest_dir }}/driver_web_app.py"
        - "{{ pi_dest_dir }}/racer_colors.py"
        - "{{ pi_dest_dir }}/redis_commands.py"
        - "{{ pi_dest_dir }}/start_franklin.py"
        - "{{ pi_dest_dir }}/start_franklin_gui_session.py"

    - name: Fail when deployed files are missing
      ansible.builtin.fail:
        msg: "Expected deployed file is missing: {{ item.item }}"
      when: not item.stat.exists
      loop: "{{ remote_deployed_file_stats.results }}"

    - name: Read deployed binary file information
      ansible.builtin.command: "file /usr/bin/franklin-hardware-monitor"
      register: binary_file_info
      changed_when: false

    - name: Report binary architecture verification
      ansible.builtin.debug:
        msg: "{{ binary_file_info.stdout }}"

    - name: Warn when binary architecture may not be ARM64
      ansible.builtin.debug:
        msg: "Warning: Could not verify ARM64 architecture in deployed binary output"
      when: >-
        ('ARM aarch64' not in binary_file_info.stdout)
        and ('ARM 64-bit' not in binary_file_info.stdout)

    - name: Restart web app services after deploy
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - franklin-web-scoreboard.service
        - franklin-web-referee.service
        - franklin-web-healthcheck.service
        - franklin-web-driver.service
      register: web_restart_result
      changed_when: web_restart_result is changed
      ignore_errors: true

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Deployment complete to {{ inventory_hostname }}:{{ pi_dest_dir }}"
          - "Deployed: franklin-hardware-monitor (Rust binary), application source files, static/, race/, tmuxinator/"
          - "Systemd unit files refreshed, daemon reloaded"
          - "Start on Pi with: cd {{ pi_dest_dir }} && ./start_franklin.py"
