---
- name: Bounce web app systemd services on Raspberry Pi
  hosts: all
  gather_facts: false
  become: true

  vars:
    franklin_web_services:
      - franklin-scoreboard
      - franklin-referee
      - franklin-healthcheck
      - franklin-driver

  tasks:
    - name: Restart web app systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop: "{{ franklin_web_services }}"
      register: bounce_result
      changed_when: bounce_result is changed
      ignore_errors: true

    - name: Bounce summary
      ansible.builtin.debug:
        msg: "{{ bounce_result.results | map(attribute='msg') | list }}"
