---
- name: Deploy GUI runtime files to Raspberry Pi
  hosts: all
  gather_facts: false
  become: true
  vars:
    project_root: "{{ playbook_dir }}/.."

  tasks:
    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ pi_dest_dir }}"
        state: directory
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"

    - name: Deploy GUI source files via rsync
      ansible.posix.synchronize:
        src: "{{ project_root }}/"
        dest: "{{ pi_dest_dir }}/"
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
          - "--exclude=.venv/"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=.git/"
          - "--exclude=rust/"
          - "--exclude=db/"
          - "--exclude=run/"
          - "--exclude=*.log"
          - "--exclude=*.sock"
          - "--exclude=*.db"
          - "--exclude=dump.rdb"
          - "--exclude=.env"
          - "--exclude=.github/"
          - "--exclude=devbox.json"
          - "--exclude=devbox.lock"
          - "--exclude=devbox.d/"
          - "--exclude=.devbox/"
          - "--exclude=.ruff_cache/"
          - "--exclude=.lavish/"
          - "--exclude=.zed/"
          - "--exclude=playbooks/"
          - "--exclude=docs/"
          - "--exclude=terminfo/"
          - "--exclude=systemd/"
      become: false

    - name: Deploy race directory (with delete)
      ansible.posix.synchronize:
        src: "{{ project_root }}/race/"
        dest: "{{ pi_dest_dir }}/race/"
        delete: true
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--delete-excluded"
          - "--chown={{ franklin_user }}:{{ franklin_group }}"
      become: false

    # Startup scripts live under scripts/ in the repo but are expected at the
    # root of pi_dest_dir (referenced by systemd, wayland-sway, and users).
    - name: Deploy startup scripts
      ansible.builtin.copy:
        src: "{{ project_root }}/scripts/{{ item }}"
        dest: "{{ pi_dest_dir }}/{{ item }}"
        owner: "{{ franklin_user }}"
        group: "{{ franklin_group }}"
        mode: "0755"
      loop:
        - start_franklin.py
        - start_franklin_gui_session.py

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Deployed GUI runtime files to {{ inventory_hostname }}:{{ pi_dest_dir }}"
          - "Updated: application source files, race/"
          - "Restart GUI session on Pi to pick up changes"
